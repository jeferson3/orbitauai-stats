monolog:
    channels:
        - deprecation
        - security_probes

when@dev:
    monolog:
        handlers:
            main:
                type: rotating_file
                path: "%kernel.logs_dir%/log.log"
                level: warning
                channels: ["!event", "!doctrine", "!messenger", "!security_probes"]

            security_probes:
                type: rotating_file
                path: "%kernel.logs_dir%/security-probes.log"
                level: info
                channels: ["security_probes"]

            doctrine:
                type: stream
                path: "php://stdout"
                level: warning
                channels: [ "doctrine" ]

            messenger:
                type: stream
                path: "php://stdout"
                level: warning
                channels: [ "messenger" ]

when@sandbox:
    monolog:
        handlers:
            main:
                type: rotating_file
                path: "%kernel.logs_dir%/log.log"
                level: warning
                channels: ["!event", "!doctrine", "!messenger", "!security_probes"]

            security_probes:
                type: rotating_file
                path: "%kernel.logs_dir%/security-probes.log"
                level: info
                channels: ["security_probes"]

            doctrine:
                type: stream
                path: "php://stdout"
                level: warning
                channels: [ "doctrine" ]

            messenger:
                type: stream
                path: "php://stdout"
                level: warning
                channels: [ "messenger" ]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event", "!security_probes"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
            security_probes:
                type: rotating_file
                path: "%kernel.logs_dir%/security-probes.log"
                level: info
                channels: ["security_probes"]

